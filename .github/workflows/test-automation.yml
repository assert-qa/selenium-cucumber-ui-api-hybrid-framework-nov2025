name: Cucumber BDD Test Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      environment:
        description: 'Environment to test'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      headless:
        description: 'Run in headless mode'
        required: false
        default: true
        type: boolean
      thread_count:
        description: 'Number of parallel threads'
        required: false
        default: '4'
        type: string

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        browser: [chrome, firefox]
        exclude:
          - os: ubuntu-latest
            browser: edge

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Setup Chrome
      if: matrix.browser == 'chrome'
      uses: browser-actions/setup-chrome@latest

    - name: Setup Firefox
      if: matrix.browser == 'firefox'
      uses: browser-actions/setup-firefox@latest

    - name: Setup Edge
      if: matrix.browser == 'edge' && matrix.os == 'windows-latest'
      uses: browser-actions/setup-edge@latest

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Clean Maven
      run: mvn clean

    - name: Compile project
      run: mvn compile

    - name: Run tests
      run: |
        mvn test -P${{ github.event.inputs.environment || 'dev' }} \
        -Dbrowser=${{ github.event.inputs.browser || matrix.browser }} \
        -Dheadless=${{ github.event.inputs.headless || 'true' }} \
        -Dthread.count=${{ github.event.inputs.thread_count || '4' }}
      continue-on-error: true

    - name: Generate Allure Report
      if: always()
      run: mvn allure:report

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/AllureReport/
        retention-days: 30

    - name: Upload Extent Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: extent-report-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/ExtentReports/
        retention-days: 30

    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/ScreenShots/
        retention-days: 7

    - name: Upload Test Videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: videos-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/RecordVideo/
        retention-days: 7

    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: |
          target/surefire-reports/*.xml

  publish-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        pattern: allure-results-*
        path: allure-results
        merge-multiple: true

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Allure Report action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

  notify:
    needs: [test, publish-report]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Send notification
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          Test Execution Completed
          Environment: ${{ github.event.inputs.environment || 'dev' }}
          Browser: ${{ github.event.inputs.browser || 'chrome' }}
          Result: ${{ job.status }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
